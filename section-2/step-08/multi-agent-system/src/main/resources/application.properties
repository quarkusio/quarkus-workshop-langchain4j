# HTTP configuration
quarkus.http.port=8080

# Application name
quarkus.application.name=car-management

# Logging configuration
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.category."com.carmanagement".level=DEBUG
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false

# Development mode log level
%dev.quarkus.log.console.level=INFO
%dev.quarkus.log.category."dev.langchain4j.agentic".level=DEBUG
%dev.quarkus.log.category."dev.langchain4j.agentic.supervisor".level=DEBUG

# Disable banner in console
quarkus.banner.enabled=false

# Static resources configuration
quarkus.http.static-resources.caching-enabled=false

# AI model configuration
quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o
quarkus.langchain4j.openai.chat-model.temperature=0
quarkus.langchain4j.openai.timeout=PT180S

# Human-in-the-Loop configuration
# Threshold for requiring human approval on high-value dispositions
car-management.approval.threshold=15000

# A2A Agent Configuration
# Note: a2aServerUrl in @A2AClientAgent does not yet support Quarkus config
# property resolution (${...}). The Kubernetes service URL is hardcoded in
# PricingAgent.java. For local dev, use section-2/step-07 instead.

# Database configuration
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=quarkus
%dev.quarkus.datasource.password=quarkus
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql

# Production database configuration (values from Kubernetes secrets/configmaps)
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
%prod.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.sql-load-script=import.sql

# Container image configuration
quarkus.container-image.registry=quay.io
quarkus.container-image.group=kevindubois
quarkus.container-image.name=miles-and-smiles
quarkus.container-image.tag=latest

# Kubernetes Config - Enable secrets and configmaps
%prod.quarkus.kubernetes-config.enabled=true
%prod.quarkus.kubernetes-config.secrets.enabled=true
%prod.quarkus.kubernetes-config.secrets=miles-and-smiles
%prod.quarkus.kubernetes-config.config-maps=miles-and-smiles-config
%prod.quarkus.kubernetes.namespace=miles-and-smiles

# Disable OpenTelemetry export (no collector configured)
quarkus.otel.exporter.otlp.traces.endpoint=
%prod.quarkus.otel.sdk.disabled=true

quarkus.podman.platform=linux/amd64
