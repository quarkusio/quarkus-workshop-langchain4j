<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Management System</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <h1>Car Management System</h1>
    
    <!-- Notification and Error Messages -->
    <div id="notification" style="display: none; background-color: #4CAF50; color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px;"></div>
    <div id="error-message" style="display: none; background-color: #f44336; color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px;"></div>
    
    <!-- Refresh Button -->
    <button id="refresh-button" style="margin-bottom: 20px; padding: 10px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Refresh Data
    </button>
    <button id="report-button" style="margin-bottom: 20px; margin-left: 10px; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;"
            onclick="window.open('/car-management/report', '_blank')">
        Generate Report
    </button>
    
    <!-- Section 1: Fleet Status -->
    <div id="fleet-status-section" class="section">
        <h2>Fleet Status</h2>
        
        <!-- Filter input -->
        <div class="filter-container">
            <input type="text" id="fleet-filter" placeholder="Filter cars..." class="filter-input">
            <select id="filter-field" class="filter-select">
                <option value="all">All Fields</option>
                <option value="id">Car Number</option>
                <option value="make">Make</option>
                <option value="model">Model</option>
                <option value="year">Year</option>
                <option value="condition">Condition</option>
                <option value="status">Status</option>
            </select>
            <button id="clear-filter" class="filter-button">Clear</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th class="sortable" data-sort="id">Car Number <span class="sort-icon">↕</span></th>
                    <th class="sortable" data-sort="make">Make <span class="sort-icon">↕</span></th>
                    <th class="sortable" data-sort="model">Model <span class="sort-icon">↕</span></th>
                    <th class="sortable" data-sort="year">Year <span class="sort-icon">↕</span></th>
                    <th>Condition</th>
                    <th class="sortable" data-sort="status">Status <span class="sort-icon">↕</span></th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="fleet-status-table-body">
                <!-- Table rows will be populated by JavaScript -->
                <tr>
                    <td colspan="7">Loading data...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- Floating Approval Notification Button -->
    <button id="approval-notification-btn" class="approval-float-btn" style="display: none;" onclick="openApprovalModal()">
        <span class="approval-icon">⏸️</span>
        <span class="approval-count-badge">0</span>
        <span class="approval-text">Approval Needed</span>
    </button>
    
    <!-- Approval Modal Overlay -->
    <div id="approval-modal" class="approval-modal" style="display: none;">
        <div class="approval-modal-content">
            <div class="approval-modal-header">
                <h2>🚨 Human Approval Required</h2>
                <button class="approval-modal-close" onclick="closeApprovalModal()">&times;</button>
            </div>
            <div class="approval-modal-body" id="approval-modal-body">
                <!-- Approval cards will be populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
